<!DOCTYPE html>

<style>

body{

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
padding:20px;
}

h1{
text-align:center;
color:white;
text-shadow:2px 2px 6px rgb(255, 0, 0);

}

#estatisticas{

color:white;
font-weight:bold;
margin-bottom:20px;

}

table{
width:100%;
border-collapse:collapse;
background-color:rgb(255, 255, 255);
backdrop-filter:blur(4px);
}

th,td{
border:1px solid rgb(0, 0, 0);
padding:8px;
text-align:center;
font-weight:bold;
}

th{
background-color:rgba(0,0,0,0.9);
color:white;
}

.subcabecalho{
color:#111;
font-weight:900;
}

tr:hover{
background-color:rgba(255, 255, 255, 0.95);
}

.artilheiro{
color:#ffc400;
}

.assist{

}

.festival{
background-color:rgb(255, 151, 151);
}

.copa{
background-color:rgb(120, 183, 255);
}

.amistoso{
background-color:rgb(255, 255, 255);
}

.titulo-setor{
background:rgba(0,0,0,0.85);
color:white;
}

</style>
</head>

{num:"x",nome:"Joeferson",pos:"PE",amist_j:5,amist_g:0,amist_a:0,fest_j:0,fest_g:0,fest_a:0,copa_j:0,copa_g:0,copa_a:0}

];

const tbody=document.getElementById("corpo-tabela");

let totalGols=0;
let totalJogos=0;

let artilheiro={nome:"",gols:0};
let liderAssist={nome:"",ass:0};

jogadores.forEach(j=>{

if(j.pos==="TITULO"){

tbody.innerHTML+=`
<tr>
<td colspan="16" class="titulo-setor">${j.nome}</td>
</tr>
`;

}else{

let jogosTotal=j.amist_j+j.fest_j+j.copa_j;
let golsTotal=j.amist_g+j.fest_g+j.copa_g;
let assistTotal=j.amist_a+j.fest_a+j.copa_a;

totalGols+=golsTotal;
totalJogos+=jogosTotal;

if(golsTotal>artilheiro.gols){
artilheiro={nome:j.nome,gols:golsTotal};
}

if(assistTotal>liderAssist.ass){
liderAssist={nome:j.nome,ass:assistTotal};
}

let classeGols=golsTotal===artilheiro.gols?"artilheiro":"";
let classeAssist=assistTotal===liderAssist.ass?"assist":"";

tbody.innerHTML+=`

<tr>

<td>${j.num}</td>
<td>${j.nome}</td>
<td>${j.pos}</td>

<td class="amistoso">${j.amist_j}</td>
<td class="amistoso ${classeGols}">${j.amist_g}</td>
<td class="amistoso ${classeAssist}">${j.amist_a}</td>
<td class="amistoso">${j.amist_g+j.amist_a}</td>

<td class="festival">${j.fest_j}</td>
<td class="festival ${classeGols}">${j.fest_g}</td>
<td class="festival ${classeAssist}">${j.fest_a}</td>
<td class="festival">${j.fest_g+j.fest_a}</td>

<td class="copa">${j.copa_j}</td>
<td class="copa ${classeGols}">${j.copa_g}</td>
<td class="copa ${classeAssist}">${j.copa_a}</td>
<td class="copa">${j.copa_g+j.copa_a}</td>

</tr>

`;

}

});

document.getElementById("estatisticas").innerHTML=
`⚽ Gols do time: ${totalGols} | 🎮 Jogos somados: ${totalJogos} | 🥇 Artilheiro: ${artilheiro.nome} (${artilheiro.gols}) | 🅰️ Líder de assistências: ${liderAssist.nome} (${liderAssist.ass})`;
